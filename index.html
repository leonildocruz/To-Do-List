<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/css/style.css" />
    <link rel="shortcut icon" href="./assets/icons/favicon.png" type="image/x-icon" />
    <title>Todo List</title>
  </head>
  <body>
    <div class="container">
      <header>
        <h1 class="page-titulo">Minhas Tarefas</h1>
      </header>

      <div>
        <div>
          <h3 class="input-label">Adicione sua tarefa:</h3>
          <input type="text" placeholder="Digite uma tarefa" class="input-tarefa" id="tarefa" />
          <button class="button" id="btn-adicionar">Adicionar</button>
        </div>

        <div class="tarefa">
          <div>
            <h4 class="input-label">Pesquisar:</h4>
            <input type="text" placeholder="Buscar" class="input-tarefa" id="pesquisar" />
            <button class="button" id="btn-pesquisar">Buscar</button>
          </div>

          <div>
            <h4 class="input-label">Filtrar:</h4>
            <select id="filter-select">
              <option value="all">Todos</option>
              <option value="done">Concluidos</option>
              <option value="todo">Pendentes</option>
            </select>
          </div>
        </div>

        <div class="editar" id="editar-tarefa">
          <h3 class="input-label">Edite sua tarefa:</h3>
          <div>
            <input type="text" placeholder="Digite a nova tarefa" class="input-editar" id="editar" />
            <button class="button" id="btn-editar">Editar</button>
            <button class="button" id="btn-cancelar-edit">Cancelar</button>
          </div>
        </div>
      </div>

      <div id="todo-list" class="lista concluido">
        <h4 class="input-label">Suas Tarefas:</h4>
        <ul id="list"></ul>
      </div>
    </div>

    <script type="module" src="./src/js/scripts.js"></script>
  </body>
</html>
